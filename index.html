<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GOODFLAT-KOREA- イベント準備アプリ v5α</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
:root{--blue:#004AAD;--blue-dk:#003A87;--blue-soft:#E7EFFA;--blue-ink:#003A87;--ink:#1A1F2B;--sub:#8A909C;--line:rgba(0,0,0,0.09);--bg:#F4F6FA;--danger:#C8455C;--danger-ink:#B23A4E;--danger-soft:#FBEAEE;--ok:#1F7A4D;--ok-soft:#E6F4EC;--amber:#C8870F;--amber-soft:#FBF1DF;--purple-soft:#EFE7F7;--purple-ink:#6B3FA0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:12px 14px 40px;min-height:100vh}
.hero{background:var(--blue);border-radius:18px;padding:22px;margin-bottom:16px;color:#fff;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:"Times New Roman",serif;font-size:23px;font-weight:700;line-height:0.96;letter-spacing:0.04em}
.logo .kr{display:block;font-size:11px;letter-spacing:0.4em;margin-top:7px;font-family:-apple-system,sans-serif;font-weight:400}
.hero .tag{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;opacity:0.85;text-align:right;line-height:1.7}
.nav{display:flex;background:#fff;border:0.5px solid var(--line);border-radius:14px;padding:4px;margin-bottom:18px;overflow-x:auto}
.nav button{flex:1;font-size:11px;padding:10px 2px;border-radius:11px;border:none;background:transparent;color:var(--sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;font-family:inherit;white-space:nowrap;min-width:60px}
.nav button i{font-size:18px}
.nav button.on{background:var(--blue);color:#fff}
.card{background:#fff;border:0.5px solid var(--line);border-radius:16px;padding:18px;margin-bottom:12px}
.muted{color:var(--sub)}
.tiny{font-size:12px}
.mini{font-size:10px;letter-spacing:0.16em;color:var(--sub)}
.row{display:flex;align-items:center;gap:10px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
.pill-a{background:var(--blue-soft);color:var(--blue-ink)}
.pill-b{background:var(--purple-soft);color:var(--purple-ink)}
.pill-ok{background:var(--ok-soft);color:var(--ok)}
.pill-ng{background:var(--danger-soft);color:var(--danger-ink)}
.pill-team-A{background:#004AAD;color:#fff}
.pill-team-B{background:#6B3FA0;color:#fff}
.pill-team-C{background:#C8870F;color:#fff}
.pill-must{background:var(--blue-soft);color:var(--blue-ink)}
.pill-may{background:#F2EFE6;color:#8A7B45}
.pill-venue{background:#EAEFF6;color:#3F5C82}
.pill-cons{background:var(--ok-soft);color:var(--ok)}
.btn{font-size:13px;padding:13px 16px;border-radius:12px;border:0.5px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;font-family:inherit;transition:all .12s}
.btn:active{transform:scale(0.985)}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-ghost-danger{color:var(--danger-ink);border-color:transparent;background:transparent}
.btn-block{width:100%;text-align:center;display:flex;align-items:center;justify-content:center;gap:7px}
input,select,textarea{font-family:inherit}
.field{width:100%;font-size:16px;padding:11px 12px;border-radius:11px;border:0.5px solid var(--line);background:#fff;color:var(--ink);margin-top:5px}
.field:focus{outline:none;border-color:var(--blue)}
textarea.field{min-height:64px;resize:vertical}
input[type="date"].field{-webkit-appearance:none;appearance:none;min-width:0;max-width:100%;text-align:left}
input[type="date"]::-webkit-date-and-time-value{text-align:left;margin:0}
.label{font-size:11px;letter-spacing:0.04em;color:var(--sub);margin-top:12px;display:block;font-weight:600}
.seg{display:flex;gap:6px;margin-top:6px}
.seg button{flex:1;font-size:13px;padding:11px 4px;border-radius:10px;border:0.5px solid var(--line);background:#fff;color:var(--sub);cursor:pointer;font-family:inherit}
.seg button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.cat-h{font-size:10px;font-weight:600;letter-spacing:0.16em;color:var(--sub);margin:20px 0 8px;display:flex;align-items:center;gap:8px}
.cat-h::after{content:'';flex:1;height:0.5px;background:var(--line)}
.det{font-size:12px;color:var(--sub);margin-top:5px;line-height:1.55}
.empty{text-align:center;color:var(--sub);padding:44px 16px;font-size:13px;line-height:1.7}
.empty i{font-size:30px;display:block;margin-bottom:10px;color:rgba(0,74,173,0.2)}
.modal-bg{position:fixed;inset:0;background:rgba(0,30,70,0.5);display:flex;align-items:flex-start;justify-content:center;padding:24px 14px;z-index:50;overflow:auto}
.modal{background:#fff;border-radius:18px;padding:22px;width:100%;max-width:380px;margin:auto}
.link{background:none;border:none;color:var(--blue);font-size:13px;cursor:pointer;padding:0;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.stat{display:flex;align-items:baseline;gap:5px}
.stat b{font-size:22px;font-weight:700;color:var(--blue)}
.notice{font-size:11px;color:var(--sub);background:#fff;border:0.5px solid var(--line);padding:11px 14px;border-radius:12px;margin-bottom:14px;line-height:1.6;display:flex;gap:8px;align-items:flex-start}
.notice i{font-size:15px;color:var(--blue);flex:0 0 auto;margin-top:1px}
.ico-btn{width:32px;height:32px;border-radius:9px;border:none;background:transparent;color:var(--sub);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(26,31,43,0.95);color:#fff;padding:16px 24px;border-radius:14px;font-size:15px;font-weight:600;z-index:99;max-width:80%;text-align:center;line-height:1.5;box-shadow:0 8px 30px rgba(0,0,0,0.25)}
.bar{height:6px;border-radius:999px;background:#E3E7EF;overflow:hidden;margin-top:8px}
.bar>div{height:100%;background:var(--blue);border-radius:999px;transition:width .25s}
.bar.ok>div{background:var(--ok)}
.li{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid var(--line)}
.li:last-child{border-bottom:none}
.li .nm{flex:1;min-width:0;font-size:14px;font-weight:600;line-height:1.4}
.qtybox{display:flex;align-items:center;gap:6px}
.qtybtn{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--blue);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.qtyval{width:48px;text-align:center;font-size:16px;font-weight:700;border:1px solid var(--line);border-radius:9px;padding:7px 2px}
.unit{font-size:11px;color:var(--sub);width:24px}
.chk{display:flex;align-items:flex-start;gap:11px;padding:13px 0;border-bottom:0.5px solid var(--line)}
.chk:last-child{border-bottom:none}
.box{width:28px;height:28px;flex:0 0 28px;border-radius:9px;border:1.5px solid rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;position:relative}
.box.done{background:var(--blue);border-color:var(--blue)}
.box.done::after{content:'';position:absolute;width:7px;height:13px;border:solid #fff;border-width:0 3px 3px 0;transform:rotate(45deg) translate(-1px,-1px)}
.cbody{flex:1;min-width:0}
.nm2{font-size:14px;font-weight:600;line-height:1.45}
.nm2.struck{color:var(--sub)}
.reqbig{font-size:15px;font-weight:700;color:var(--blue)}
.reqng{font-size:14px;font-weight:700;color:var(--danger-ink)}
.evcard{background:#fff;border:0.5px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:10px;cursor:pointer}
.evtitle{font-weight:700;font-size:16px;line-height:1.35}
.evdate{font-size:12px;color:var(--sub);margin-top:3px}
table{width:100%;border-collapse:collapse}
.infotbl td{font-size:13px;padding:7px 0;vertical-align:top;border-bottom:0.5px solid var(--line)}
.infotbl tr:last-child td{border-bottom:none}
.infotbl td.k{color:var(--sub);width:36%;font-size:12px}
.flag{flex:0 0 auto;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--sub);display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;font-weight:600;padding:7px 9px;white-space:nowrap;align-self:flex-start}
.flag i{font-size:14px}
.flag.on{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
.reqcard{border-left:3px solid var(--danger)}
.reqcard.kekkin{border-left-color:var(--amber)}
.dnd-item.dragging{opacity:0.4}
.dnd-item.drag-over{border-top:2px solid var(--blue)}
</style>
</head>

</div>

    +'<button class="btn" style="padding:6px 12px;font-size:12px" onclick="syncFromGas()"'+(online&&!syncing?'':' disabled')+'><i class="ti ti-refresh"></i> 同期</button>'

// 同期状態
let syncStatus = navigator.onLine ? 'online' : 'offline';
let syncing = false;
let lastSyncAt = '';

// GASから読み込み（イベント・依頼・品目）
function syncFromGas(silent){
  if(!DB.cfg.gasUrl){ if(!silent) toast('スプレッド連携設定が未設定です'); return; }
  if(!navigator.onLine){ syncStatus='offline'; if(!silent) toast('オフラインです'); render(); return; }
  if(syncing) return;
  syncing=true; if(!silent) toast('同期中…');
  fetch(DB.cfg.gasUrl,{method:'GET',redirect:'follow'})
    .then(function(res){ return res.json(); })
    .then(function(data){
      if(!data||data.ok!==true){ throw new Error(data&&data.error||'同期エラー'); }
      // イベント取り込み
      const serverEvents = data.events||[];
      // ローカルにあって計算済みのフィールド（calSynced等）は保持
      const eventMap = {};
      DB.events.forEach(e=>{ eventMap[e.id]=e; });
      DB.events = serverEvents.map(se=>{
        const local = eventMap[se.id];
        return Object.assign({calSynced:true}, local||{}, se);
      });
      saveEvents();
      // 依頼取り込み
      const serverReqs = data.reqs||[];
      const items = data.items||[];
      const reqMap = {};
      DB.reqs.forEach(r=>{ reqMap[r.id]=r; });
      DB.reqs = serverReqs.map(sr=>{
        const local = reqMap[sr.id] || {qty:{},actual:{},equipQty:{},equipActual:{},locked:false};
        // 品目を qty/actual と equipQty/equipActual に展開
        const myItems = items.filter(it=>it.reqId===sr.id);
        const qty={}, actual={}, equipQty={}, equipActual={};
        myItems.forEach(it=>{
          if(it.kind==='equip'){
            equipQty[it.no]=it.request;
            if(it.actual!=null) equipActual[it.no]=it.actual;
          } else {
            qty[it.no]=it.request;
            if(it.actual!=null) actual[it.no]=it.actual;
            // 追加品目はGAS依頼に名前が入っている。準備担当など他端末のlitemsに無ければ取り込む。
            //  #57：GASがkindを'custom'で返さない場合もあるため、「名前があり・equipでなく・手元のlitemsに無い品目」を
            //       追加品目として取り込む（標準の積込品目は全端末で既にlitemsにあるので無害＝重複しない）。#51の是正を拡張。
            if(it.name){
              const cur=litems();
              if(!cur.some(li=>Number(li.no)===Number(it.no))){ DB.litems=cur.concat([{no:Number(it.no),cat:'custom',name:it.name,unit:it.unit||'個'}]); saveLitems(); }
            }
          }
        });
        // lockedは「サーバの確定状態(#77)」を最優先。加えてローカル確定・完了・実数入力済みでも確定扱い。
        //  ＝依頼者が『依頼を確定』したら、その確定が積み込者(別端末)にも伝わり、開くと確認モードで出る。
        const srLocked = sr.locked===true || String(sr.locked).toLowerCase()==='true' || sr.locked===1 || sr.locked==='1';
        // #77再修正：GASが locked 列を返さない環境でも直るように、同期される「担当(checker)／作業日(workdate)」が
        //  入っていれば“依頼者が積み込者へ確定して回した”とみなし確認モードにする（担当・作業日は req_save で往復する）。
        const assigned = !!String(sr.checker || local.checker || '').trim() || !!String(sr.workdate || local.workdate || '').trim();
        const locked = srLocked || assigned || local.locked || sr.done || (Object.keys(actual).length>0) || (Object.keys(equipActual).length>0);
        return Object.assign({}, local, sr, {qty:qty,actual:actual,equipQty:equipQty,equipActual:equipActual,locked:locked});
      });
      saveReqs();
      syncing=false;
      lastSyncAt = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      syncStatus='online';
      render();
      if(!silent) toast('同期しました（'+serverEvents.length+'件のイベント）');
    })
    .catch(function(err){
      syncing=false;
      if(!silent) toast('同期に失敗しました');
      console.error('sync error',err);
    });
}

// 依頼をGASに保存
function saveReqToGas(r){
  if(!DB.cfg.gasUrl) return;
  if(!navigator.onLine){ syncStatus='offline'; return; }
  // 品目を平坦化
  const items=[];
  Object.keys(r.qty||{}).forEach(no=>{ const q=Number(r.qty[no])||0; if(q<=0) return;
    const li=litems().find(x=>x.no===Number(no));
    items.push({kind:(li&&li.cat==='custom')?'custom':'load',no:Number(no),name:li?li.name:'',unit:li?li.unit:'',request:q,actual:(r.actual||{})[no]==null?'':r.actual[no]});
  });
  Object.keys(r.equipQty||{}).forEach(no=>{ const q=Number(r.equipQty[no])||0; if(q<=0) return;
    const mi=master().find(x=>x.no===Number(no));
    items.push({kind:'equip',no:Number(no),name:mi?mi.name:'',unit:mi?mi.unit:'',request:q,actual:(r.equipActual||{})[no]==null?'':r.equipActual[no]});
  });
  const payload={action:'req_save',req:{id:r.id,eventId:r.eventId,requester:r.requester||'',checker:r.checker||'',due:r.due||'',workdate:r.workdate||'',locked:!!r.locked,done:!!r.done,doneAt:r.doneAt||'',sent:!!r.sent,sentAt:r.sentAt||''},items:items};
  fetch(DB.cfg.gasUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).catch(function(){});
}
// 依頼をGASから削除
function deleteReqFromGas(reqId){
  if(!DB.cfg.gasUrl) return;
  if(!navigator.onLine) return;
  fetch(DB.cfg.gasUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'req_delete',reqId:reqId})}).catch(function(){});
}

  renderModal();
}

function prepRangeLabel(openday){
  try{ const d=new Date(openday+'T00:00:00'); const s=new Date(d.getTime()-14*86400000); const e=new Date(d.getTime()-86400000);
    return (s.getMonth()+1)+'/'+s.getDate()+' 〜 '+(e.getMonth()+1)+'/'+e.getDate(); } catch(e){ return ''; }
}

function delEvent(id){
  const req=findReqByEvent(id);
  const msg=req?'このイベントを削除すると、紐づく積み込み依頼も削除されます。カレンダーの予定も削除されます。管理者パスワードを入力してください。':'このイベントを削除します。カレンダーの予定も削除されます。管理者パスワードを入力してください。';
  modal={type:'confirm',needPass:true,msg:msg,ok:function(){
    const ev=findEvent(id);
    // カレンダー予定を削除リクエスト
    if(ev.calSynced) sendGas({action:'event_delete',eventId:id});
    // データ削除
    DB.reqs=DB.reqs.filter(r=>r.eventId!==id);
    DB.events=DB.events.filter(e=>e.id!==id);
    saveReqs(); saveEvents(); curEvent=null; modal=null; render(); toast('削除しました');
  }};
  renderModal();
}

function reqListHTML(){
  let h='<div class="notice"><i class="ti ti-info-circle"></i> 積み込み依頼の一覧です。新規作成は「イベント」タブから対象イベントを選んで行います。スタッフ全員で共有されます。</div>';

  DB.reqs.slice().reverse().forEach(r=>{
    const ev=findEvent(r.eventId);
    const st=reqStats(r);

      +'<div class="between"><div style="min-width:0">'
      +'<div class="mini" style="margin-bottom:5px"><span class="pill pill-team-'+((ev&&ev.team)||r.team||'A')+'">'+((ev&&ev.team)||r.team||'A')+'チーム</span> <span class="pill '+badge+'">'+label+'</span></div>'
      +'<div style="font-weight:700;font-size:16px;line-height:1.35">'+esc(ev?ev.name:r.name||'(イベント削除済み)')+'</div>'
      +'<div class="tiny muted" style="margin-top:3px">'+(r.requester?'依頼：'+esc(r.requester):'')+(r.due?' ・ 期限'+esc(r.due):'')+'</div>'
      +'</div><i class="ti ti-chevron-right muted" style="font-size:18px"></i></div>';
    if(r.done) h+='<div class="tiny" style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap"><span style="color:var(--ok);font-weight:600"><i class="ti ti-circle-check-filled" style="vertical-align:-2px"></i> 完了'+(r.doneAt?'（'+esc(r.doneAt)+'）':'')+'</span>'+(r.sent?'<span style="color:var(--ok);font-weight:600"><i class="ti ti-cloud-check" style="vertical-align:-2px"></i> 送信済</span>':'<span style="color:var(--danger-ink);font-weight:700"><i class="ti ti-cloud-x" style="vertical-align:-2px"></i> 送信未</span>')+'</div>';
    else if(r.locked){ const pct=st.kinds?Math.round(st.checked/st.kinds*100):0;
      h+='<div style="margin-top:12px"><div class="between tiny"><span class="muted">確認の進捗</span><span style="font-weight:600">'+st.checked+'/'+st.kinds+'</span></div><div class="bar '+(st.ng===0&&st.checked===st.kinds&&st.kinds>0?'ok':'')+'"><div style="width:'+pct+'%"></div></div>'+(st.ng>0?'<div class="tiny" style="margin-top:8px;color:var(--danger-ink)"><i class="ti ti-alert-triangle" style="vertical-align:-2px"></i> 数量不一致 '+st.ng+'件</div>':'')+'</div>'; }
    h+='</div>';
  });
  return h;
}
function reqStats(r){
  const qty=r.qty||{}, actual=r.actual||{};
  const equipQty=r.equipQty||{}, equipActual=r.equipActual||{};
  const kinds=Object.keys(qty).filter(no=>qty[no]>0).length + Object.keys(equipQty).filter(no=>equipQty[no]>0).length;
  let checked=0, ng=0;
  Object.keys(qty).forEach(no=>{ if(qty[no]<=0) return; if(actual[no]!=null){ checked++; if(Number(actual[no])!==Number(qty[no])) ng++; } });
  Object.keys(equipQty).forEach(no=>{ if(equipQty[no]<=0) return; if(equipActual[no]!=null){ checked++; if(Number(equipActual[no])!==Number(equipQty[no])) ng++; } });
  return {kinds:kinds,checked:checked,ng:ng};
}

// 台数衝突チェック：同時開催のイベントで常備品が所有数を超えていないか
function checkEquipConflicts(r){
  const ev=findEvent(r.eventId);
  if(!ev||!ev.openday||!ev.closeday) return [];
  // 期間の前後1日を含めてロック
  const myStart=parseDateAdd(ev.openday,-1);
  const myEnd=parseDateAdd(ev.closeday,1);
  const conflicts=[];
  Object.keys(r.equipQty||{}).forEach(no=>{
    const want=Number(r.equipQty[no])||0; if(want<=0) return;
    const it=master().find(x=>x.no===Number(no)); if(!it) return;
    const total=Number(it.total||0);
    // 他の依頼でこの備品を使っている量を集計（期間が重なるもの）
    let used=0;
    DB.reqs.forEach(other=>{
      if(other.id===r.id) return;
      const oEv=findEvent(other.eventId);
      if(!oEv||!oEv.openday||!oEv.closeday) return;
      const oStart=parseDateAdd(oEv.openday,-1);
      const oEnd=parseDateAdd(oEv.closeday,1);
      // 期間が重なるか判定
      if(oStart<=myEnd&&myStart<=oEnd){
        const q=Number((other.equipQty||{})[no])||0;
        used+=q;
      }
    });
    if(want+used>total){
      conflicts.push({name:it.name,want:want+esc(it.unit||''),used:used+esc(it.unit||''),total:total+esc(it.unit||'')});
    }
  });
  return conflicts;
}
function parseDateAdd(s,offset){
  if(!s) return null;
  const p=String(s).split('-'); if(p.length!==3) return null;
  const d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2]));
  d.setDate(d.getDate()+offset);
  return d;
}

function saveCustomItem(){ const name=(document.getElementById('ci-name').value||'').trim(); if(!name){toast('品目名を入力してください');return;} const unit=(document.getElementById('ci-unit').value||'個').trim();
  // #57：追加品目の番号(no)は端末をまたいで“一意”にする。以前は端末ごとの連番(最大+1)だったため、
  //   別端末で作った別の追加品目と番号が衝突し、準備担当(相手側)の同期取り込み(no一致で判定)で弾かれて表示されない不具合があった。

  const m=litems().slice(); m.push({no:no,cat:'custom',name:name,unit:unit}); DB.litems=m; saveLitems(); if(!curReq.qty) curReq.qty={}; curReq.qty[no]=1; saveReqs(); modal=null; render(); }

function sendGas(payload,onOk,onErr){
  if(!DB.cfg.gasUrl){ toast('スプレッド連携設定が未設定です'); if(onErr) onErr(); return; }
  fetch(DB.cfg.gasUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(function(){ if(onOk) onOk(); }).catch(function(){ if(onErr) onErr(); });
}
function buildLoadPayload(r){
  const items=[]; const ev=findEvent(r.eventId);
  LCATS.concat(['custom']).forEach(cat=>{ litems().filter(it=>it.cat===cat&&(r.qty||{})[it.no]>0).forEach(it=>{
    const req=r.qty[it.no]; const act=(r.actual||{})[it.no];
    items.push({category:(cat==='custom'?'追加品目':cat),name:it.name,unit:it.unit,request:req,actual:(act==null?'':act),match:(act==null?'未確認':(Number(act)===Number(req)?'一致':'不一致'))});
  }); });
  // 常備品も品目に含める
  master().filter(it=>!it.consumable && (r.equipQty||{})[it.no]>0).forEach(it=>{
    const req=r.equipQty[it.no]; const act=(r.equipActual||{})[it.no];
    items.push({category:'常備品（'+it.cat+'）',name:it.name,unit:it.unit||'',request:req,actual:(act==null?'':act),match:(act==null?'未確認':(Number(act)===Number(req)?'一致':'不一致'))});
  });
  const st=reqStats(r);
  return {action:'loading_complete', sentAt:new Date().toISOString(), eventId:r.eventId,
    venue:ev?ev.name:'', dest:ev?ev.dest:'', team:ev?ev.team:'', requester:r.requester||'', checker:r.checker||'',
    date:ev?ev.date:'', openday:ev?ev.openday:'', closeday:ev?ev.closeday:'', due:r.due||'', workdate:r.workdate||'', carrier:ev?ev.carrier:'',
    done:!!r.done, doneAt:r.doneAt||'',
    kinds:st.kinds, checked:st.checked, mismatch:st.ng, items:items};
}

  const r=curReq;

  toast('送信中…');

}

function deductStockOnComplete(r){
  const m=master().slice();
  let changed=false;
  Object.keys(r.qty||{}).forEach(lno=>{
    const q=Number(r.qty[lno])||0; if(q<=0) return;
    const map=LOAD_TO_MASTER[lno]; if(!map) return;
    const idx=m.findIndex(x=>x.no===map.masterNo);
    if(idx<0) return;
    const cur=Number(m[idx].stock||0);
    const next=Math.max(0,cur-q*(map.ratio||1));
    m[idx]=Object.assign({},m[idx],{stock:next});
    changed=true;
  });
  if(changed){ DB.master=m; saveMaster(); }
}

/* ===== ドラッグ&ドロップ並び替え ===== */
let dndState={dragNo:null,zone:null,key:null};
function dndStart(e,no,zone,key){
  dndState={dragNo:no,zone:zone,key:key};
  if(e.target&&e.target.classList) e.target.classList.add('dragging');
  if(e.dataTransfer){ e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',String(no));}catch(_){} }
}
function dndOver(e){ e.preventDefault(); if(e.dataTransfer) e.dataTransfer.dropEffect='move'; }
function dndEnd(e){
  if(e.target&&e.target.classList) e.target.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
}
function dndDrop(e,targetNo,zone,key){
  e.preventDefault();
  const srcNo=dndState.dragNo;
  if(srcNo==null||srcNo===targetNo||dndState.zone!==zone||dndState.key!==key){ dndEnd(e); return; }
  const m=master().slice();
  let list;
  if(zone==='master') list=m.filter(x=>x.cat===key);
  else if(zone==='order') list=m.filter(x=>x.orderManage);
  else { dndEnd(e); return; }
  list.sort((a,b)=>(a.order||0)-(b.order||0));
  const srcIdx=list.findIndex(x=>x.no===srcNo);
  const tgtIdx=list.findIndex(x=>x.no===targetNo);
  if(srcIdx<0||tgtIdx<0){ dndEnd(e); return; }
  const moved=list.splice(srcIdx,1)[0];
  list.splice(tgtIdx,0,moved);
  list.forEach((it,i)=>{ const idx=m.findIndex(x=>x.no===it.no); if(idx>=0) m[idx]=Object.assign({},m[idx],{order:i}); });
  DB.master=m; saveMaster(); dndEnd(e); render();
}

function gv(id){ const e=document.getElementById(id); return e?e.value:''; }
function saveItem(no,isNew){
  const cons=document.getElementById('f-cons').checked;
  const wh=document.getElementById('f-wh').checked;
  const orderManage=cons&&document.getElementById('f-order').checked;
  const place=gv('f-place').trim();
  if(!place){ toast('保管場所を入力してください'); return; }
  const total=Number(gv('f-total'))||0;
  const it={no:no,name:gv('f-name').trim()||'無題',use:gv('f-use'),cat:gv('f-cat'),total:total,a:Math.ceil(total/2),b:Math.floor(total/2),unit:gv('f-unit')||'個',jisha:'必須',mall:'必須',honsha:'必要時',place:place,pri:'中',consumable:cons,warehouse:wh,orderManage:orderManage};
  const old=master().find(i=>i.no===no); if(old){it.note=old.note; it.venue=old.venue; it.damage=old.damage; it.report=old.report; it.order=old.order!=null?old.order:0;}
  if(cons){
    it.stock=Number(gv('f-stock'))||0;
    it.orderPoint=Number(gv('f-op'))||0;
    it.orderUnit=gv('f-ou');
    it.orderBase=gv('f-ob');
    // 発注情報
    it.janCode=gv('f-jan');
    it.size=gv('f-size');
    it.color=gv('f-color');
    it.lotSize=gv('f-lotsize');
    it.lotPrice=gv('f-lotprice');
    it.supplier=gv('f-supplier');
    if(old){ it.minA=old.minA||0; it.minB=old.minB||0; }
  }
  let m=master().slice();
  if(isNew){
    // カテゴリ内の末尾に追加
    const sameCat=m.filter(x=>x.cat===it.cat);
    it.order=sameCat.length?Math.max(...sameCat.map(x=>x.order||0))+1:0;
    m.push(it);
  } else m=m.map(i=>i.no===no?it:i);
  DB.master=m; saveMaster(); modal=null; render();
}
load();
